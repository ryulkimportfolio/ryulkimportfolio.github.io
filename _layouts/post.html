<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — 🌰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  {% if page.math %}
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']] },
      options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  {% endif %}
</head>
<body>

<header class="masthead">
  <div class="masthead-title"><a href="/" style="text-decoration:none;color:inherit">🌰</a></div>
  <div class="masthead-meta">Quant Researcher · Seoul<br>Est. 2022</div>
</header>

<nav class="site-nav">
  <a href="/">Work</a>
  <a href="/blog">Writing</a>
</nav>

<article class="post-container">
  <header class="post-header">
    <div class="post-meta-top">
      <span class="post-date">{{ page.date | date: "%Y-%m-%d" }}</span>
      {% if page.tags %}
      <span class="post-tags">{% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}</span>
      {% endif %}
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.excerpt %}<p class="post-excerpt">{{ page.excerpt }}</p>{% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    <a href="/blog" class="back-link">← All articles</a>
  </footer>
</article>

</body>
</html>
